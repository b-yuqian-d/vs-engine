name: build
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-reh-web:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential g++ libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev python-is-python3

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - run: npm run gulp vscode-reh-web-linux-x64-min

      - run: tar -czf vscode-reh-web-linux-x64.tar.gz -C .. vscode-reh-web-linux-x64

      - uses: actions/upload-artifact@v7
        with:
          path: vscode-reh-web-linux-x64.tar.gz
          archive: 'false'

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          token: '${{ secrets.ACCESS_TOKEN_FOR_GITHUB_ACTIONS }}'
          files: vscode-reh-web-linux-x64.tar.gz
